<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>audioNest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #14141c;
            --elevated: #1c1c26;
            --gold: #d4af37;
            --gold-soft: rgba(212, 175, 55, 0.15);
            --accent: #a78bfa;
            --text: #f0f0f5;
            --text-sec: #a0a0b0;
            --border: rgba(255,255,255,0.08);
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .serif { font-family: 'DM Serif Display', serif; }

        .app-container {
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            background: linear-gradient(180deg, #0a0a0f, #0f0f17);
            position: relative;
        }

        .app-header {
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10,10,15,0.95);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -1px;
        }
        .logo span { color: var(--gold); }

        .main-content { padding: 20px 20px 100px; }

        .view { display: none; animation: fadeIn 0.4s ease; }
        .active-view { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Premium Cards */
        .book-card {
            flex: 0 0 142px;
            background: var(--card);
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .book-card:active { transform: scale(0.94); }

        .book-cover {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
        }

        .bottom-nav {
            position: fixed;
            bottom: 16px;
            left: 16px;
            right: 16px;
            background: rgba(28,28,38,0.95);
            backdrop-filter: blur(30px);
            border-radius: 9999px;
            padding: 10px 12px;
            display: flex;
            justify-content: space-around;
            z-index: 1000;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .nav-item {
            text-align: center;
            color: #888;
            font-size: 11px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .nav-item.active {
            color: var(--gold);
        }

        .btn-primary {
            background: var(--gold);
            color: #0a0a0f;
            border: none;
            padding: 16px;
            border-radius: 9999px;
            font-weight: 700;
            font-size: 17px;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(212,175,55,0.3);
        }

        .glass {
            background: rgba(26,26,38,0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
        }

        .back-btn {
            position: absolute;
            top: 16px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            z-index: 10;
            cursor: pointer;
        }

        .progress-bar {
            height: 6px;
            background: #333;
            border-radius: 9999px;
            position: relative;
            cursor: pointer;
        }
        .progress {
            height: 100%;
            background: linear-gradient(90deg, var(--gold), #f0c040);
            border-radius: 9999px;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="app-header">
        <div class="logo">audio<span>Nest</span></div>
        <div class="avatar-icon" id="profileAvatarBtn">JD</div>
    </div>

    <div class="main-content" id="mainContent">
        <!-- HOME -->
        <div id="view-home" class="view active-view">
            <div style="margin-bottom: 28px;">
                <h1 class="serif" style="font-size: 38px; line-height: 1.1;">Ανακαλύψτε<br><span style="color:var(--gold);">Ιστορίες</span></h1>
                <p style="color:var(--text-sec); margin-top: 8px;">Χιλιάδες audiobooks στα χέρια σας</p>
            </div>

            <div class="section-header"><h3>✨ Νέα & Trending</h3><span class="see-all" onclick="showToast('Όλα τα trending')">Δες όλα</span></div>
            <div class="horizontal-scroll" id="trendingBooks"></div>

            <div class="section-header"><h3>🔥 Best Sellers</h3><span class="see-all">Δες όλα</span></div>
            <div class="horizontal-scroll" id="bestsellerBooks"></div>

            <div class="section-header"><h3>📖 Είδη</h3></div>
            <div id="genresContainer" style="display:flex; flex-wrap:wrap; gap:10px; margin-bottom:30px;"></div>
        </div>

        <!-- LIBRARY -->
        <div id="view-library" class="view">
            <h2 class="serif" style="font-size:34px; margin-bottom:8px;">Βιβλιοθήκη μου</h2>
            <p style="color:var(--text-sec);">Τα audiobooks που αγόρασες</p>
            <div id="libraryList" style="margin-top:24px;"></div>
        </div>

        <!-- SEARCH -->
        <div id="view-search" class="view">
            <input type="text" id="searchInput" placeholder="Αναζήτησε τίτλο ή συγγραφέα..." class="form-input" style="width:100%; padding:16px; border-radius:9999px; background:var(--elevated); border:none; margin-bottom:20px;">
            <div id="searchResults"></div>
        </div>

        <!-- PRODUCT -->
        <div id="view-product" class="view">
            <button class="back-btn" onclick="navigateBack()"><i data-lucide="arrow-left" style="color:white;"></i></button>
            <div id="productDetailContainer"></div>
        </div>

        <!-- PAYMENT -->
        <div id="view-payment" class="view">
            <button class="back-btn" onclick="navigateBack()"><i data-lucide="arrow-left"></i></button>
            <div id="paymentContainer"></div>
        </div>

        <!-- PLAYER -->
        <div id="view-player" class="view">
            <button class="back-btn" onclick="navigateBack()"><i data-lucide="arrow-left"></i></button>
            <div id="playerContainer"></div>
            <audio id="playerAudio" preload="metadata"></audio>
        </div>

        <!-- PROFILE -->
        <div id="view-profile" class="view">
            <button class="back-btn" onclick="navigateBack()"><i data-lucide="arrow-left"></i></button>
            <div style="text-align:center; padding:40px 20px 20px;">
                <div style="width:110px;height:110px;margin:0 auto;border-radius:50%;background:linear-gradient(135deg,#8b5cf6,#d4af37);display:flex;align-items:center;justify-content:center;font-size:48px;font-weight:700;">JD</div>
                <h2 style="margin-top:16px;">John Doe</h2>
                <p style="color:var(--text-sec);">Premium Μέλος</p>
            </div>
            <div class="glass" style="margin:0 20px; border-radius:20px; padding:8px;">
                <div onclick="navigateTo('userdetails')" style="padding:16px 20px; border-bottom:1px solid var(--border); cursor:pointer;">📋 Στοιχεία Χρήστη</div>
                <div onclick="navigateTo('paymentmethods')" style="padding:16px 20px; border-bottom:1px solid var(--border); cursor:pointer;">💳 Πορτοφόλι & Πληρωμές</div>
                <div style="padding:16px 20px;">🔔 Ειδοποιήσεις</div>
            </div>
        </div>
    </div>

    <!-- MINI PLAYER -->
    <div id="miniPlayer" style="display:none; position:fixed; bottom:85px; left:50%; transform:translateX(-50%); width:92%; max-width:380px; background:rgba(20,20,32,0.97); backdrop-filter:blur(30px); border-radius:20px; padding:12px 16px; box-shadow:0 15px 40px rgba(0,0,0,0.6); z-index:999;">
        <div style="display:flex; align-items:center; gap:12px;">
            <img id="miniCover" src="" style="width:52px; height:52px; border-radius:12px; object-fit:cover;">
            <div style="flex:1; overflow:hidden;">
                <div id="miniTitle" style="font-weight:600; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;"></div>
                <div id="miniAuthor" style="font-size:13px; color:var(--text-sec);"></div>
            </div>
            <button onclick="togglePlay()" id="miniPlayBtn" style="background:none; border:none; font-size:34px; color:var(--gold);">⏸</button>
        </div>
    </div>

    <!-- BOTTOM NAV -->
    <div class="bottom-nav">
        <button class="nav-item active" data-nav="home"><i data-lucide="home"></i><span>Αρχική</span></button>
        <button class="nav-item" data-nav="library"><i data-lucide="library"></i><span>Βιβλιοθήκη</span></button>
        <button class="nav-item" data-nav="search"><i data-lucide="search"></i><span>Αναζήτηση</span></button>
    </div>
</div>

<script>
// ==================== DATA & STATE ====================
const booksDB = [ /* ... same as your original ... */ ];
let purchasedBooks = [];
let currentBook = null;
let selectedPaymentMethod = "Apple Pay";
let audioPlayer = document.getElementById("playerAudio");
let isPlayingGlobal = false;

// LocalStorage
function loadFromStorage() {
    if (localStorage.getItem('purchasedBooks')) purchasedBooks = JSON.parse(localStorage.getItem('purchasedBooks'));
}
function saveToStorage() {
    localStorage.setItem('purchasedBooks', JSON.stringify(purchasedBooks));
}

// Render Books
function renderBookCards(books, containerId, isLibrary = false) {
    const container = document.getElementById(containerId);
    if (!container) return;
    container.innerHTML = books.map(book => `
        <div class="book-card" onclick="openProduct(${book.id})">
            <img src="${book.cover}" class="book-cover">
            <div style="padding:10px;">
                <div class="book-title">${book.title}</div>
                <div class="book-author">${book.author}</div>
                ${isLibrary ? `<small style="color:#4fba87">✓ Αγορασμένο</small>` : ''}
            </div>
        </div>
    `).join('');
    lucide.createIcons();
}

// Open Product
function openProduct(id) {
    currentBook = booksDB.find(b => b.id === id);
    renderProductDetail();
    navigateTo('product');
}

// Product Detail (Premium)
function renderProductDetail() {
    const isOwned = purchasedBooks.some(b => b.id === currentBook.id);
    const html = `
        <img src="${currentBook.cover}" style="width:100%; border-radius:24px; margin-bottom:24px; box-shadow:0 25px 50px -15px black;">
        <h1 class="serif" style="font-size:32px; line-height:1.1;">${currentBook.title}</h1>
        <p style="color:var(--text-sec); font-size:18px;">${currentBook.author} • ${currentBook.narrator}</p>
        
        <div style="margin:24px 0;">
            <button onclick="playSample()" class="btn-primary" style="background:transparent; border:2px solid var(--gold); color:var(--gold);">🎧 Ακούστε Δείγμα</button>
        </div>
        
        ${isOwned ? 
            `<button onclick="startPlayback()" class="btn-primary">▶ Συνέχεια Ακρόασης</button>` : 
            `<button onclick="openPayment()" class="btn-primary">💰 Αγορά — €${currentBook.price}</button>`
        }
        
        <div style="margin-top:40px;">
            <strong>Περίληψη</strong>
            <p style="color:var(--text-sec); line-height:1.7; margin-top:12px;">${currentBook.summary}</p>
        </div>
    `;
    document.getElementById('productDetailContainer').innerHTML = html;
}

// Payment
function openPayment() {
    const html = `
        <div style="text-align:center; padding:30px 20px;">
            <img src="${currentBook.cover}" style="width:110px; border-radius:16px; margin-bottom:20px;">
            <h3>${currentBook.title}</h3>
            <p style="font-size:28px; color:var(--gold); margin:12px 0;">€${currentBook.price}</p>
            <button onclick="completePurchase()" class="btn-primary" style="margin-top:30px;">Ολοκλήρωση Αγοράς με Apple Pay</button>
        </div>
    `;
    document.getElementById('paymentContainer').innerHTML = html;
    navigateTo('payment');
}

function completePurchase() {
    if (!purchasedBooks.find(b => b.id === currentBook.id)) {
        purchasedBooks.push(currentBook);
        saveToStorage();
    }
    showToast("✅ Αγορά ολοκληρώθηκε επιτυχώς!");
    setTimeout(() => {
        navigateTo('player');
        startPlayback();
    }, 600);
}

// Player
function startPlayback() {
    document.getElementById('miniPlayer').style.display = 'block';
    document.getElementById('miniCover').src = currentBook.cover;
    document.getElementById('miniTitle').textContent = currentBook.title;
    document.getElementById('miniAuthor').textContent = currentBook.author;

    audioPlayer.src = currentBook.audioUrl;
    audioPlayer.play();
    isPlayingGlobal = true;
}

// Toggle Play from Mini Player
function togglePlay() {
    if (isPlayingGlobal) audioPlayer.pause();
    else audioPlayer.play();
    isPlayingGlobal = !isPlayingGlobal;
    document.getElementById('miniPlayBtn').textContent = isPlayingGlobal ? '⏸' : '▶';
}

function playSample() {
    audioPlayer.src = currentBook.audioUrl;
    audioPlayer.play();
    setTimeout(() => audioPlayer.pause(), 8000);
    showToast("🎧 Παίζει δείγμα 8 δευτερολέπτων");
}

// Navigation
function navigateTo(view) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
    document.getElementById(`view-${view}`).classList.add('active-view');

    document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
    const activeBtn = document.querySelector(`.nav-item[data-nav="${view}"]`);
    if (activeBtn) activeBtn.classList.add('active');
}

function navigateBack() {
    navigateTo('home');
}

// Toast
function showToast(msg) {
    const toast = document.createElement('div');
    toast.textContent = msg;
    toast.style.cssText = `position:fixed; bottom:110px; left:50%; transform:translateX(-50%); background:#1c1c26; color:white; padding:14px 26px; border-radius:9999px; z-index:9999; border:1px solid var(--gold);`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2800);
}

// Init
function initializeApp() {
    loadFromStorage();
    
    // Render sections
    renderBookCards(booksDB.slice(0,5), 'trendingBooks');
    renderBookCards(booksDB.slice(1,6), 'bestsellerBooks');

    // Genres
    const genres = ["Ρομαντικά","Μυστήριο & Θρίλερ","Μυθιστορήματα","Αυτοβοήθεια","Παιδικά"];
    document.getElementById('genresContainer').innerHTML = genres.map(g => 
        `<span onclick="showToast('Κατηγορία: \( {g}')" style="background:var(--elevated); padding:10px 18px; border-radius:9999px; font-size:14px; cursor:pointer;"> \){g}</span>`
    ).join('');

    // Bottom Nav
    document.querySelectorAll('.nav-item').forEach(btn => {
        btn.addEventListener('click', () => {
            const nav = btn.getAttribute('data-nav');
            navigateTo(nav);
        });
    });

    lucide.createIcons();
    showToast("Καλώς ήρθατε στο audioNest ✨");
}

window.onload = initializeApp;
window.openProduct = openProduct;
window.navigateTo = navigateTo;
window.navigateBack = navigateBack;
window.showToast = showToast;
</script>
</body>
</html>
