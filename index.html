<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>audioNest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #111118;
            --elevated: #1a1a24;
            --gold: #d4af37;
            --accent: #8b5cf6;
            --text: #f1f1f5;
            --text-secondary: #a8a8b8;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
        }
        .serif { font-family: 'DM Serif Display', serif; }

        .app { 
            max-width: 430px; 
            margin: 0 auto; 
            min-height: 100vh; 
            background: linear-gradient(to bottom, #0a0a0f, #0f0f1a);
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
        }

        /* Loading Screen */
        #loading-screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 1000;
            transition: opacity 0.8s ease;
        }
        .logo-spin {
            font-size: 52px;
            font-weight: 700;
            letter-spacing: -2px;
            animation: logoPulse 2s infinite;
        }
        @keyframes logoPulse {
            0%, 100% { opacity: 0.7; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        /* Header */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(10,10,15,0.95);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .logo {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -1.2px;
        }
        .logo span { color: var(--gold); }

        /* Hero */
        .hero {
            height: 380px;
            background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.75)), 
                        url('https://images.unsplash.com/photo-1544716278-ca5e3f4abd8c?w=900') center/cover no-repeat;
            display: flex;
            align-items: flex-end;
            padding: 32px 24px;
            position: relative;
        }

        .book-card {
            width: 148px;
            flex-shrink: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .book-card:active {
            transform: scale(0.92) translateY(4px);
        }
        .book-cover {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            border-radius: 18px;
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.7);
            transition: transform 0.4s ease;
        }
        .book-card:hover .book-cover,
        .book-card:active .book-cover {
            transform: scale(1.06);
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 400px;
            background: rgba(20,20,32,0.95);
            backdrop-filter: blur(30px);
            border-radius: 9999px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-around;
            z-index: 999;
            border: 1px solid rgba(212,175,55,0.15);
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #777;
            font-size: 11px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .nav-item.active {
            color: var(--gold);
        }
        .nav-item i { margin-bottom: 4px; transition: transform 0.3s; }
        .nav-item.active i { transform: scale(1.15); }

        .btn-primary {
            background: linear-gradient(90deg, var(--gold), #f0c040);
            color: #0a0a0f;
            border: none;
            padding: 16px 24px;
            border-radius: 9999px;
            font-weight: 700;
            font-size: 17px;
            width: 100%;
            box-shadow: 0 8px 25px rgba(212,175,55,0.3);
        }

        .glass {
            background: rgba(26,26,38,0.65);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
        }
    </style>
</head>
<body>
<div class="app">

    <!-- LOADING SCREEN -->
    <div id="loading-screen">
        <div class="logo-spin">audio<span style="color:#d4af37">Nest</span></div>
        <p style="margin-top:24px; color:#888; font-size:15px;">Φόρτωση premium εμπειρίας...</p>
    </div>

    <!-- HEADER -->
    <header>
        <div class="logo">audio<span>Nest</span></div>
        <div onclick="navigateTo('profile')" style="width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#8b5cf6,#d4af37);display:flex;align-items:center;justify-content:center;font-weight:700;color:white;cursor:pointer;box-shadow:0 4px 15px rgba(139,92,246,0.4);">MA</div>
    </header>

    <!-- HOME -->
    <div id="view-home" class="view active">
        <div class="hero" onclick="openProduct(1)">
            <div>
                <span style="background:rgba(212,175,55,0.2); color:#ffd700; padding:4px 12px; border-radius:9999px; font-size:13px;">ΝΕΟ</span>
                <h1 class="serif" style="font-size:42px; line-height:1.05; margin:16px 0 8px;">Το Κομμάτι που Λείπει</h1>
                <p style="font-size:18px; color:#ddd;">Ελένη Πριοβόλου</p>
            </div>
        </div>

        <div style="padding:24px 20px 8px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                <h2 class="serif" style="font-size:23px;">Συνέχισε να ακούς</h2>
            </div>
            <div class="horizontal-scroll" id="continue"></div>
        </div>

        <div style="padding:8px 20px 8px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                <h2 class="serif" style="font-size:23px;">Νέα &amp; Δημοφιλή</h2>
                <span onclick="showToast('Εμφάνιση όλων')" style="color:var(--gold); font-size:15px;">Όλα</span>
            </div>
            <div class="horizontal-scroll" id="trending"></div>
        </div>
    </div>

    <!-- LIBRARY, SEARCH, PRODUCT, PAYMENT, PLAYER, PROFILE views (συμπτυγμένα για συντομία) -->
    <div id="view-library" class="view">...</div>
    <div id="view-search" class="view">...</div>
    <div id="view-product" class="view"></div>
    <div id="view-payment" class="view"></div>
    <div id="view-player" class="view"></div>
    <div id="view-profile" class="view"></div>

    <!-- MINI PLAYER -->
    <div id="mini-player" style="display:none; position:fixed; bottom:85px; left:50%; transform:translateX(-50%); width:92%; max-width:380px; background:rgba(20,20,32,0.97); backdrop-filter:blur(30px); border-radius:20px; padding:12px; box-shadow:0 15px 40px rgba(0,0,0,0.6); z-index:998;">
        <div style="display:flex; align-items:center; gap:14px;">
            <img id="mini-cover" src="" style="width:54px; height:54px; border-radius:12px; object-fit:cover;">
            <div style="flex:1; overflow:hidden;">
                <div id="mini-title" style="font-weight:600; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;"></div>
                <div id="mini-author" style="font-size:13px; color:var(--text-secondary);"></div>
            </div>
            <button onclick="togglePlay()" id="mini-play-btn" style="background:none; border:none; font-size:32px; color:var(--gold); width:44px;">▶</button>
        </div>
    </div>

    <!-- BOTTOM NAV -->
    <div class="bottom-nav glass">
        <div class="nav-item active" onclick="navigateTo('home')"><i data-lucide="home"></i><div>Αρχική</div></div>
        <div class="nav-item" onclick="navigateTo('library')"><i data-lucide="library"></i><div>Βιβλιοθήκη</div></div>
        <div class="nav-item" onclick="navigateTo('search')"><i data-lucide="search"></i><div>Αναζήτηση</div></div>
    </div>
</div>

<audio id="audio-player"></audio>

<script>
// Data
const booksDB = [
    {id:1, title:"Το Κομμάτι που Λείπει", author:"Ελένη Πριοβόλου", price:14.99, cover:"https://images.unsplash.com/photo-1544716278-ca5e3f4abd8c?w=800", audioUrl:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"},
    {id:2, title:"Σκιές στο Σκοτάδι", author:"Μαρία Λαμπροπούλου", price:12.99, cover:"https://images.unsplash.com/photo-1512820790803-83ca734da794?w=800"},
    {id:3, title:"Atomic Habits", author:"James Clear", price:19.99, cover:"https://images.unsplash.com/photo-1589998059171-988d887df646?w=800"},
];

let currentBook = null;
let purchased = [];
let isPlaying = false;
const audio = document.getElementById('audio-player');

// Loading Screen
setTimeout(() => {
    document.getElementById('loading-screen').style.opacity = '0';
    setTimeout(() => {
        document.getElementById('loading-screen').style.display = 'none';
    }, 800);
}, 1600);

// Render Functions
function renderBooks(containerId, books) {
    const container = document.getElementById(containerId);
    container.innerHTML = books.map(book => `
        <div class="book-card" onclick="openProduct(${book.id})">
            <img src="${book.cover}" class="book-cover">
            <div style="padding:8px 4px 0;">
                <div style="font-weight:600; font-size:14.5px;">${book.title}</div>
                <div style="color:var(--text-secondary); font-size:13px;">${book.author}</div>
            </div>
        </div>
    `).join('');
}

function initHome() {
    renderBooks('trending', booksDB);
    renderBooks('continue', booksDB.slice(0,3));
}

function openProduct(id) {
    currentBook = booksDB.find(b => b.id === id);
    const html = `
        <div style="padding:20px;">
            <button onclick="navigateTo('home')" style="font-size:32px; background:none; border:none; color:white; margin-bottom:10px;">←</button>
            <img src="${currentBook.cover}" style="width:100%; border-radius:22px; box-shadow:0 25px 50px -15px black;">
            <h1 class="serif" style="font-size:34px; margin:24px 0 6px;">${currentBook.title}</h1>
            <p style="font-size:18px; color:var(--text-secondary);">${currentBook.author}</p>
            
            <div style="margin:32px 0 40px;">
                <button onclick="playSample()" style="width:100%; padding:16px; background:transparent; border:2px solid var(--gold); color:var(--gold); border-radius:9999px; font-weight:600;">▶ Ακούστε δείγμα</button>
            </div>
            
            <button onclick="startPurchaseFlow()" class="btn-primary">Αγορά — €${currentBook.price}</button>
        </div>
    `;
    document.getElementById('view-product').innerHTML = html;
    navigateTo('product');
}

function startPurchaseFlow() {
    showToast("🔄 Μετάβαση σε ασφαλή πληρωμή...");
    setTimeout(() => {
        purchased.push(currentBook);
        navigateTo('player');
        startPlayback();
    }, 900);
}

function startPlayback() {
    document.getElementById('mini-player').style.display = 'block';
    document.getElementById('mini-cover').src = currentBook.cover;
    document.getElementById('mini-title').textContent = currentBook.title;
    document.getElementById('mini-author').textContent = currentBook.author;

    audio.src = currentBook.audioUrl;
    audio.play();
    isPlaying = true;
}

function togglePlay() {
    if (isPlaying) audio.pause();
    else audio.play();
    isPlaying = !isPlaying;
    document.getElementById('mini-play-btn').textContent = isPlaying ? '⏸' : '▶';
}

function playSample() {
    audio.src = currentBook.audioUrl;
    audio.play();
    setTimeout(() => audio.pause(), 7000);
    showToast("🎧 Παίζει δείγμα 7 δευτερολέπτων");
}

function navigateTo(view) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    const target = document.getElementById(`view-${view}`);
    if (target) target.classList.add('active');

    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    const active = Array.from(document.querySelectorAll('.nav-item')).find(el => el.getAttribute('onclick').includes(`'${view}'`));
    if (active) active.classList.add('active');
}

function showToast(msg) {
    const t = document.createElement('div');
    t.style.cssText = `position:fixed;bottom:110px;left:50%;transform:translateX(-50%);background:#1f1f2b;padding:14px 26px;border-radius:9999px;color:white;z-index:9999;font-size:15px;box-shadow:0 10px 30px rgba(0,0,0,0.5);white-space:nowrap;`;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2600);
}

// Initialize
window.onload = () => {
    initHome();
    lucide.createIcons();
    showToast("Καλώς ήρθατε στο audioNest ✨");
};
</script>
</body>
</html>
